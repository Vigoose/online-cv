about_content: |
  I build production AI agent systems for developer workflows at Amazon. Multi-agent orchestration, persistent memory, MCP server integrations, RAG-backed retrieval, and the eval loops that keep it all honest in production.

  Power user of agentic coding tools. My daily work sits at the boundary between what current models can do reliably and where evals, validation loops, and human-in-the-loop feedback are still load-bearing.

  Currently most interested in <mark>AI dev tools</mark>, <mark>agentic coding platforms</mark>, and <mark>LLM eval-backed quality loops</mark>. Open to Senior IC roles in the SF Bay Area and remote.

more_content: |
  Before the AI work, a decade of backend and developer-platform engineering — Kubernetes microservices, RabbitMQ, Elasticsearch, Prometheus observability, and customer-facing detail-page features on Amazon Devices. The infra instinct is what makes the AI work hold up under load — production AI is mostly a reliability problem dressed up as a model problem.

  On the side, I run 23 production cron pipelines behind a unified gateway with circuit breakers, Claude-driven self-heal, multi-provider LLM routing, and pre-send guardrails across every outbound channel.

